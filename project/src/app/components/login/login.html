<div
  style="
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    padding: 2rem;
  "
>
  <div
    style="
      width: 100%;
      max-width: 450px;
      background: #ffffff;
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      border: 1px solid #e5e7eb;
    "
  >

    <!-- Header -->
    <div style="text-align: center; margin-bottom: 2rem;">
      <h2
        style="
          color: #1e3a8a;
          font-size: 2rem;
          font-weight: 700;
          margin-bottom: 8px;
        "
      >
        Leave Management System
      </h2>

      <p
        style="
          color: #6b7280;
          font-size: 14px;
          margin: 0;
        "
      >
        Employee Leave Portal
      </p>
    </div>

    <!-- Error Message -->
    <!-- Error Message -->
@if (errorMessage) {
  <div
    style="
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
    "
  >
    {{ errorMessage }}
  </div>
}

    <!-- Form -->
    <form (ngSubmit)="onSubmit()">

      <!-- Role Selection -->
      

      <!-- Email -->
      <div style="margin-bottom: 20px;">
        <label
          for="email"
          style="
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
          "
        >
          Work Email
        </label>

        <input
          id="email"
          name="email"
          type="email"
          [(ngModel)]="email"
          placeholder="employee@company.com"
          required
          style="
            width: 100%;
            height: 48px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 0 14px;
            outline: none;
            box-sizing: border-box;
          "
        />
      </div>

      <!-- Password -->
      <div style="margin-bottom: 20px;">
        <label
          for="password"
          style="
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
          "
        >
          Password
        </label>

        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="password"
          placeholder="Enter Password"
          required
          style="
            width: 100%;
            height: 48px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 0 14px;
            outline: none;
            box-sizing: border-box;
          "
        />
      </div>

      <!-- Sign In -->
      <button
        type="submit"
        
        style="
          width: 100%;
          background: #1e3a8a;
          color: white;
          border: none;
          padding: 14px;
          border-radius: 10px;
          font-size: 15px;
          font-weight: 600;
          cursor: pointer;
        "
      >
        Sign In
      </button>

    </form>

  </div>
</div>
